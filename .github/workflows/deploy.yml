name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

    # Notify on build failure
      - if: failure()
        run: curl -d "❌ mp3me build FAILED on ${{ github.sha }}" ntfy.sh/jsb-gh

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      # Notify on deploy success
      - if: success()
        run: curl -d "✅ mp3me deployed to ${{ steps.deployment.outputs.page_url }}" ntfy.sh/jsb-gh

      # Notify on deploy failure
      - if: failure()
        run: curl -d "❌ mp3me deploy FAILED (build passed but deploy failed)" ntfy.sh/jsb-gh
